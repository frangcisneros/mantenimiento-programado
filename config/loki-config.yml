auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki # Directorio base para datos y configuraciones

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  chunk_idle_period: 5m
  chunk_retain_period: 30s

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper # Cambiado a `boltdb-shipper` para compatibilidad
      object_store: filesystem
      schema: v11 # Cambiado a v11 para evitar errores
      index:
        prefix: index_
        period: 24h # Cambiado a 24h como recomendado

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/cache
  filesystem:
    directory: /loki/chunks

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  allow_structured_metadata: false # Deshabilitado para evitar errores

compactor:
  working_directory: /loki/compactor # Directorio requerido para el compactador
