version: '3.9'

services:
    traefik:
        image: traefik:v3.3
        container_name: traefik
        restart: unless-stopped
        security_opt:
            - no-new-privileges:true
        ports:
            - 80:80
            - 443:443
            - 9100:9100 # Puerto para las métricas de Prometheus
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
            - ./config/config.yml:/etc/traefik/config.yml:ro
            - ./certs:/etc/certs:ro
            - ./logs:/var/log/traefik
        networks:
            - mired
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.traefik=true"
    loki:
        image: grafana/loki:latest
        container_name: loki
        ports:
            - "3100:3100"
        volumes:
            - ./config/loki-config.yml:/etc/loki/local-config.yaml
            - ./logs:/var/log/traefik
        command: -config.file=/etc/loki/local-config.yaml
        networks:
            - mired

    promtail:
        image: grafana/promtail:latest
        container_name: promtail
        volumes:
            - ./logs:/var/log/traefik
            - /var/lib/docker/containers:/var/lib/docker/containers
            - /var/run/docker.sock:/var/run/docker.sock
        command: -config.file=/etc/promtail/config.yml
        networks:
            - mired
    grafana:
        image: grafana/grafana:latest
        container_name: grafana
        ports:
            - "3000:3000"
        networks:
            - mired
    web:
        build: .
        command: gunicorn main_app.wsgi:application --bind 0.0.0.0:8000 --workers 3
        volumes:
            - .:/app
        environment:
            - POSTGRES_DB=mantenimiento_db
            - POSTGRES_USER=admin_mantenimiento
            - POSTGRES_PASSWORD=admin_mantenimiento
        depends_on:
            - traefik
            - db
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.web.rule=Host(`web.mantenimiento.localhost`)"
            - "traefik.http.routers.web.tls=true"
            - "traefik.http.services.web.loadbalancer.server.port=8000"
            - "traefik.docker.network=mired"
            - "traefik.http.middlewares.web.circuitbreaker.expression=LatencyAtQuantileMs(50.0) > 100"
            - "traefik.http.middlewares.web.circuitbreaker.expression=ResponseCodeRatio(500, 600, 0, 600)>0.25"
            - "traefik.http.middlewares.web.circuitbreaker.expression=NetworkErrorRatio() > 0.5"
        networks:
            - mired

    nginx:
        image: nginx:stable-alpine
        ports:
            - "8080:80" # Publicamos el puerto 80 del contenedor en el host
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - web
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.nginx.rule=Host(`nginx.mantenimiento.localhost`)"
            - "traefik.http.routers.nginx.tls=true"
            - "traefik.http.services.nginx.loadbalancer.server.port=80"
            - "traefik.docker.network=mired"
        networks:
            - mired
    db:
        image: postgres:13
        environment:
            POSTGRES_DB: mantenimiento_db
            POSTGRES_USER: admin_mantenimiento
            POSTGRES_PASSWORD: admin_mantenimiento
        volumes:
            - pgdata:/var/lib/postgresql/data
        networks:
            - mired

volumes:
    pgdata:


networks:
    mired:
        driver: bridge
        external: true
